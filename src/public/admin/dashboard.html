<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo - Éclosion des sens</title>
  <meta name="description" content="Panel de administración para gestionar reservas y contenido de Éclosion des sens.">
  <meta name="author" content="Ariane Gardi">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>
  <!-- HEADER -->
  <header class="admin-header">
    <div class="header-content">
      <div class="brand">
        <div class="brand-logo"><img src="../img/logo.negro.jpg" alt="Logo Éclosion des sens" style="width: 100%; height: 100%; border-radius: 12px;"></div>
        <div>
          <h1 data-i18n="admin.panel_title">Panel de Administración</h1>
          <p class="brand-subtitle" data-i18n="admin.panel_subtitle">Éclosion des sens</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="userTag" class="user-badge">Cargando...</span>
        <button class="btn-icon" id="changePassBtn" type="button" title="Cambiar contraseña">🔐</button>
        <button class="btn-primary btn-small" id="logoutBtn" type="button" data-i18n="admin.salir">Salir</button>
      </div>
    </div>
  </header>

  <!-- MENSAJES -->
  <div id="panelMessage" class="message"></div>

  <main class="admin-main">
    <!-- SECCIÓN RESERVAS -->
    <section class="admin-section">
      <div class="section-header">
        <h2 class="section-title">📅 Reservas</h2>
        <p class="section-subtitle">Gestiona, actualiza y elimina reservas</p>
      </div>

      <div class="reservas-table-container">
        <table class="reservas-table">
          <thead>
            <tr>
              <th class="sortable" data-sort="nombre">👤 Cliente <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="telefono">📱 Teléfono <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="email">📧 Email <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="fecha_reserva">📅 Fecha <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="hora_reserva">🕐 Hora <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="tipo_masaje">💆 Tipo <span class="sort-icon">⇅</span></th>
              <th class="sortable" data-sort="estado">📋 Estado <span class="sort-icon">⇅</span></th>
              <th>📝 Notas</th>
              <th>⚙️ Acciones</th>
            </tr>
          </thead>
          <tbody id="reservasBody">
            <!-- Las reservas se renderizarán aquí dinámicamente -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- SECCIÓN DISPONIBILIDAD -->
    <section class="admin-section">
      <div class="section-header">
        <div>
          <h2 class="section-title">⏰ Disponibilidad</h2>
          <p class="section-subtitle">Define tus horas de disponibilidad</p>
        </div>
        <button class="btn-primary" id="toggleFormBtn" type="button">+ Añadir disponibilidad</button>
      </div>

      <!-- FORMULARIO DE DISPONIBILIDAD (ACORDEÓN) -->
      <div class="accordion-form" id="slotFormContainer">
        <form id="slotForm" class="form-grid">
          <div class="form-group">
            <label for="fecha_disponibilidad">📆 Selecciona fecha</label>
            <input type="date" id="fecha_disponibilidad" name="fecha_disponibilidad" required>
          </div>
          <div class="form-group">
            <label for="hora">🕐 Hora</label>
            <input type="time" id="hora" name="hora" required>
          </div>
          <div class="form-group">
            <label for="disponible">Estado</label>
            <select id="disponible" name="disponible">
              <option value="1">Disponible</option>
              <option value="0">No disponible</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Guardar</button>
          <button type="button" class="btn-secondary" id="cancelFormBtn">Cancelar</button>
        </form>
      </div>

      <!-- TABLA DE DISPONIBILIDAD -->
      <div class="disponibilidad-container">
        <div id="disponibilidadContainer" class="slots-grid">
          <!-- Los slots se renderizarán aquí dinámicamente -->
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL DE CAMBIO DE CONTRASEÑA -->
  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closePasswordModal()">×</button>
      <h2>🔐 Cambiar contraseña</h2>
      <div id="passwordMessage" class="message"></div>
      <form id="passwordForm" class="form-grid" style="margin-top: 16px;">
        <div class="form-group">
          <label for="currentPassword">Contraseña actual</label>
          <input type="password" id="currentPassword" name="currentPassword" required>
        </div>
        <div class="form-group">
          <label for="newPassword">Nueva contraseña</label>
          <input type="password" id="newPassword" name="newPassword" required>
        </div>
        <div class="form-group">
          <label for="newPasswordConfirm">Confirmar contraseña</label>
          <input type="password" id="newPasswordConfirm" name="newPasswordConfirm" required>
        </div>
        <button type="submit" class="btn-primary">Actualizar</button>
      </form>
    </div>
  </div>

<script src="/js/admin-dashboard.js?v=2"></script>
</body>
</html>
